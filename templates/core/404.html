{% extends 'core/base.html' %}

{% block title %}Page Not Found - {% if site_settings %}{{ site_settings.site_name }}{% else %}SwiftCart{% endif %}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-code text-danger">404</div>
            <h1 class="display-1 fw-bold text-dark">Page Not Found</h1>
            <p class="lead text-muted">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="mt-4">
                <a href="{% url 'home' %}" class="btn btn-primary me-2">
                    <i class="fas fa-home me-2"></i>Go Home
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Go Back
                </a>
            </div>
        </div>
    </div>
</div>

<style>
.error-code {
    font-size: 8rem;
    font-weight: bold;
    line-height: 1;
}
</style>
{% endblock %}
