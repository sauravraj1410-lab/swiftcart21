{% extends 'core/base.html' %}

{% block title %}Server Error - {% if site_settings %}{{ site_settings.site_name }}{% else %}SwiftCart{% endif %}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-code text-warning">500</div>
            <h1 class="display-1 fw-bold text-dark">Server Error</h1>
            <p class="lead text-muted">
                Something went wrong on our end. We're working to fix it!
            </p>
            <div class="mt-4">
                <a href="{% url 'home' %}" class="btn btn-primary me-2">
                    <i class="fas fa-home me-2"></i>Go Home
                </a>
                <button onclick="location.reload()" class="btn btn-outline-secondary">
                    <i class="fas fa-sync me-2"></i>Try Again
                </button>
            </div>
        </div>
    </div>
</div>

<style>
.error-code {
    font-size: 8rem;
    font-weight: bold;
    line-height: 1;
}
</style>
{% endblock %}
