{% extends 'core/base.html' %}
{% load static %}

{% block title %}Manage Products{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Products</h2>
        <a href="{% url 'seller_add_product' %}" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>Add New Product
        </a>
    </div>

    <!-- Filters and Search -->
    <div class="row mb-4">
        <div class="col-md-3">
            <select class="form-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="draft">Draft</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select" id="categoryFilter">
                <option value="">All Categories</option>
            </select>
        </div>
        <div class="col-md-4">
            <input type="text" class="form-control" id="searchProducts" placeholder="Search products...">
        </div>
        <div class="col-md-2">
            <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Reset</button>
        </div>
    </div>

    <!-- Products Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            </th>
                            <th>Product</th>
                            <th>UNIT</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Featured</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable">
                        <tr>
                            <td colspan="9" class="text-center py-4">
                                <div class="spinner-border spinner-border-sm text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <span class="ms-2">Loading products...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Bulk Actions -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <div id="bulkActions" style="display: none;">
                    <select class="form-select form-select-sm d-inline-block w-auto me-2" id="bulkAction">
                        <option value="">Bulk actions...</option>
                        <option value="activate">Activate</option>
                        <option value="deactivate">Deactivate</option>
                        <option value="delete">Delete</option>
                    </select>
                    <button class="btn btn-sm btn-primary" onclick="applyBulkAction()">Apply</button>
                </div>
                <div id="pagination"></div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Product Modal -->
<div class="modal fade" id="editProductModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editProductForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="editName" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="editCategory" class="form-label">Category</label>
                            <select class="form-select" id="editCategory" required>
                                <option value="">Select category...</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="editSku" class="form-label">SKU</label>
                            <input type="text" class="form-control" id="editSku" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="editPrice" class="form-label">Price</label>
                            <input type="number" class="form-control" id="editPrice" step="0.01" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="editStock" class="form-label">Stock Quantity</label>
                            <input type="number" class="form-control" id="editStock" min="0">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="editStatus" class="form-label">Status</label>
                            <select class="form-select" id="editStatus">
                                <option value="active">Active</option>
                                <option value="draft">Draft</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="form-check mt-4">
                                <input class="form-check-input" type="checkbox" id="editFeatured">
                                <label class="form-check-label" for="editFeatured">
                                    Featured Product
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveProductChanges()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
let products = [];
let categories = [];
let selectedProducts = new Set();
let currentEditingProduct = null;

document.addEventListener('DOMContentLoaded', async () => {
    await loadCategories();
    await loadProducts();
    
    // Event listeners
    document.getElementById('statusFilter').addEventListener('change', renderProducts);
    document.getElementById('categoryFilter').addEventListener('change', renderProducts);
    document.getElementById('searchProducts').addEventListener('input', renderProducts);
});

async function loadCategories() {
    try {
        const response = await fetch('/api/products/categories/', {
            headers: {
                'Authorization': `Bearer ${localStorage.getItem('access_token')}`
            }
        });
        
        if (response.ok) {
            categories = await response.json();
            
            // Populate filter dropdown
            const filterSelect = document.getElementById('categoryFilter');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                filterSelect.appendChild(option);
            });
            
            // Populate edit modal dropdown
            const editSelect = document.getElementById('editCategory');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                editSelect.appendChild(option);
            });
        }
    } catch (error) {
        console.error('Error loading categories:', error);
    }
}

async function loadProducts() {
    try {
        const response = await fetch('/api/products/', {
            headers: {
                'Authorization': `Bearer ${localStorage.getItem('access_token')}`
            }
        });
        
        if (response.ok) {
            products = await response.json();
            renderProducts();
        } else {
            document.getElementById('productsTable').innerHTML = `
                <tr>
                    <td colspan="9" class="text-center py-4">
                        <p class="text-muted">Unable to load products. Please try again.</p>
                    </td>
                </tr>
            `;
        }
    } catch (error) {
        console.error('Error loading products:', error);
    }
}

function renderProducts() {
    const tbody = document.getElementById('productsTable');
    const statusFilter = document.getElementById('statusFilter').value;
    const categoryFilter = document.getElementById('categoryFilter').value;
    const searchTerm = document.getElementById('searchProducts').value.toLowerCase();
    
    let filteredProducts = products.filter(product => {
        if (statusFilter && product.status !== statusFilter) return false;
        if (categoryFilter && product.category !== parseInt(categoryFilter)) return false;
        if (searchTerm && !product.name.toLowerCase().includes(searchTerm) && 
            !product.sku.toLowerCase().includes(searchTerm)) return false;
        return true;
    });
    
    if (filteredProducts.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="9" class="text-center py-4">
                    <i class="fas fa-box fa-2x text-muted mb-2"></i>
                    <p class="text-muted">No products found</p>
                </td>
            </tr>
        `;
        return;
    }
    
    tbody.innerHTML = filteredProducts.map(product => `
        <tr>
            <td>
                <input type="checkbox" class="product-checkbox" value="${product.id}" 
                       onchange="toggleProductSelection(${product.id})">
            </td>
            <td>
                <div class="d-flex align-items-center">
                    ${product.image ? `<img src="${product.image}" class="me-2" width="40" height="40" alt="${product.name}">` : ''}
                    <div>
                        <div class="fw-bold">${product.name}</div>
                        <small class="text-muted">${product.slug}</small>
                    </div>
                </div>
            </td>
            <td>${product.sku}</td>
            <td>${getCategoryName(product.category)}</td>
            <td>INR ${product.price}</td>
            <td>
                <span class="${product.stock_quantity <= 10 ? 'text-danger' : ''}">${product.stock_quantity}</span>
                ${product.stock_quantity <= 10 ? '<i class="fas fa-exclamation-triangle text-danger ms-1"></i>' : ''}
            </td>
            <td>
                <span class="badge bg-${getStatusColor(product.status)}">${product.status}</span>
            </td>
            <td>
                ${product.featured ? '<i class="fas fa-star text-warning"></i>' : '-'}
            </td>
            <td>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-primary" onclick="editProduct(${product.id})" title="Edit">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-outline-info" onclick="duplicateProduct(${product.id})" title="Duplicate">
                        <i class="fas fa-copy"></i>
                    </button>
                    <button class="btn btn-outline-danger" onclick="deleteProduct(${product.id})" title="Delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
}

function getCategoryName(categoryId) {
    const category = categories.find(cat => cat.id === categoryId);
    return category ? category.name : 'N/A';
}

function getStatusColor(status) {
    const colors = {
        'active': 'success',
        'draft': 'secondary',
        'inactive': 'danger'
    };
    return colors[status] || 'secondary';
}

function toggleProductSelection(productId) {
    if (selectedProducts.has(productId)) {
        selectedProducts.delete(productId);
    } else {
        selectedProducts.add(productId);
    }
    updateBulkActions();
}

function toggleSelectAll() {
    const selectAll = document.getElementById('selectAll');
    const checkboxes = document.querySelectorAll('.product-checkbox');
    
    checkboxes.forEach(checkbox => {
        checkbox.checked = selectAll.checked;
        const productId = parseInt(checkbox.value);
        if (selectAll.checked) {
            selectedProducts.add(productId);
        } else {
            selectedProducts.delete(productId);
        }
    });
    
    updateBulkActions();
}

function updateBulkActions() {
    const bulkActions = document.getElementById('bulkActions');
    if (selectedProducts.size > 0) {
        bulkActions.style.display = 'block';
    } else {
        bulkActions.style.display = 'none';
    }
}

async function applyBulkAction() {
    const action = document.getElementById('bulkAction').value;
    if (!action) return;
    
    if (action === 'delete' && !confirm(`Are you sure you want to delete ${selectedProducts.size} product(s)?`)) {
        return;
    }
    
    try {
        for (const productId of selectedProducts) {
            const response = await fetch(`/api/products/${productId}/`, {
                method: action === 'delete' ? 'DELETE' : 'PATCH',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('access_token')}`,
                    'Content-Type': 'application/json'
                },
                body: action !== 'delete' ? JSON.stringify({
                    status: action === 'activate' ? 'active' : 'inactive'
                }) : undefined
            });
            
            if (!response.ok) {
                throw new Error(`Failed to ${action} product ${productId}`);
            }
        }
        
        await loadProducts();
        selectedProducts.clear();
        updateBulkActions();
        alert(`Successfully ${action}d ${selectedProducts.size} product(s)`);
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

function editProduct(productId) {
    const product = products.find(p => p.id === productId);
    if (!product) return;
    
    currentEditingProduct = product;
    document.getElementById('editName').value = product.name;
    document.getElementById('editSku').value = product.sku;
    document.getElementById('editPrice').value = product.price;
    document.getElementById('editStock').value = product.stock_quantity;
    document.getElementById('editStatus').value = product.status;
    document.getElementById('editFeatured').checked = product.featured;
    document.getElementById('editCategory').value = product.category || '';
    
    new bootstrap.Modal(document.getElementById('editProductModal')).show();
}

async function saveProductChanges() {
    if (!currentEditingProduct) return;
    
    const formData = {
        name: document.getElementById('editName').value,
        sku: document.getElementById('editSku').value,
        price: parseFloat(document.getElementById('editPrice').value),
        stock_quantity: parseInt(document.getElementById('editStock').value),
        status: document.getElementById('editStatus').value,
        featured: document.getElementById('editFeatured').checked,
        category: document.getElementById('editCategory').value
    };
    
    try {
        const response = await fetch(`/api/products/${currentEditingProduct.id}/`, {
            method: 'PATCH',
            headers: {
                'Authorization': `Bearer ${localStorage.getItem('access_token')}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });
        
        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('editProductModal')).hide();
            await loadProducts();
        } else {
            const data = await response.json();
            alert('Error: ' + JSON.stringify(data));
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

async function deleteProduct(productId) {
    if (!confirm('Are you sure you want to delete this product?')) return;
    
    try {
        const response = await fetch(`/api/products/${productId}/`, {
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${localStorage.getItem('access_token')}`
            }
        });
        
        if (response.ok) {
            await loadProducts();
        } else {
            alert('Error deleting product');
        }
    } catch (error) {
        alert('Error: ' + error.message);
    }
}

function duplicateProduct(productId) {
    // TODO: Implement duplicate functionality
    alert('Duplicate functionality coming soon!');
}

function resetFilters() {
    document.getElementById('statusFilter').value = '';
    document.getElementById('categoryFilter').value = '';
    document.getElementById('searchProducts').value = '';
    renderProducts();
}
</script>
{% endblock %}
